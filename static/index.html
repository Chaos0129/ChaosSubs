<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ChaosSubs - 视频字幕翻译</title>
    <link rel="stylesheet" href="/static/style.css">
</head>
<body>
    <div id="disconnect-banner" class="disconnect-banner" hidden>
        服务已断开连接，请检查服务是否正在运行
    </div>

    <div class="container">
        <h1 class="logo">ChaosSubs</h1>
        <p class="subtitle">视频字幕提取 & 中文翻译</p>

        <div class="tabs">
            <button class="tab active" data-tab="new">新建任务</button>
            <button class="tab" data-tab="tasks">任务管理</button>
        </div>

        <!-- New Task Tab: Upload only -->
        <div id="tab-new" class="tab-content active">
            <div id="drop-zone" class="drop-zone">
                <div class="drop-icon">🎬</div>
                <p>拖拽视频到这里，或点击选择文件</p>
                <p class="hint">支持 MP4、MKV、AVI、MOV 等格式，最大 10GB</p>
                <input type="file" id="file-input" accept="video/*" hidden>
            </div>
            <div id="file-info" class="file-info" hidden>
                <span id="file-name"></span>
                <button id="clear-btn" class="btn-small">✕</button>
            </div>
            <div class="lang-select">
                <label for="source-lang">源语言</label>
                <select id="source-lang">
                    <option value="ja" selected>日语</option>
                    <option value="en">英语</option>
                    <option value="ko">韩语</option>
                    <option value="auto">自动检测</option>
                </select>
            </div>
            <button id="upload-btn" class="btn-primary" hidden>提交任务</button>
        </div>

        <!-- Tasks Tab: All tasks live here -->
        <div id="tab-tasks" class="tab-content">
            <div id="job-list" class="job-list"></div>
        </div>
    </div>

    <script src="/static/state.js"></script>
    <script src="/static/view.js"></script>
    <script src="/static/app.js"></script>
</body>
</html>
